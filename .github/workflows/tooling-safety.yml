name: Tooling Safety

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  mutation-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check mutation safety
        run: pnpm check:mutation-safety

      - name: Type check
        run: pnpm exec tsc --noEmit
